    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Barovia Campaign Chronicle</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <header>
        <h1>Barovia Campaign Chronicle</h1>
        <p>"I am the Ancient. I am the Land."</p>
    </header>

    <div class="tabs-container">
        <div class="tab-menu" id="tabMenu">
		<button class="tab-btn" onclick="loadFragment('players', event)">Companions</button>
		<button class="tab-btn" onclick="loadFragment('sessions', event)">Chronicles</button>
		<button class="tab-btn" onclick="loadFragment('npcs', event)">Denizens</button>
		<button class="tab-btn" onclick="loadFragment('quests', event)">Quests</button>
		<button class="tab-btn" onclick="loadFragment('lore', event)">Lore</button>
		<button class="tab-btn" onclick="loadFragment('locations', event)">Realm</button>
        <button class="tab-btn" onclick="loadFragment('map', event)">Map</button>
		<button class="tab-btn" onclick="loadFragment('tarokka', event)">Tarokka</button>
		<button class="tab-btn" onclick="loadFragment('library', event)">Library</button>

        </div>

        <div class="search-wrapper" style="padding: 15px;">
            <input type="text" id="liveSearch" class="search-bar" placeholder="Search current tab..." onkeyup="filterContent()">
        </div>

        <div id="content-area" class="tab-content active" style="display: block;">
            </div>
    </div>

    <script>
        async function loadFragment(filename, event) {
            // Fetch the HTML file from the content folder
            const response = await fetch(`content/${filename}.html`);
            const html = await response.text();
            
            // Inject content
            document.getElementById('content-area').innerHTML = html;
            
            // Reset search input
            document.getElementById('liveSearch').value = '';
            
            // Update UI: active button class
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
        }

        // Live Filter Function
        function filterContent() {
            const input = document.getElementById('liveSearch').value.toLowerCase();
            const items = document.querySelectorAll('#content-area .card, #content-area tr');

            items.forEach(item => {
                const text = item.innerText.toLowerCase();
                item.style.display = text.includes(input) ? '' : 'none';
            });
        }

        // Load default content on page load
        window.onload = () => {
            const firstTab = document.querySelector('.tab-btn');
            firstTab.click(); 
        };

function showInfo(locationName) {
  const panel = document.getElementById('info-panel');
  const title = document.getElementById('location-name');
  const desc = document.getElementById('location-desc');

  const entry = locationInfo[locationName];

  if (!entry) {
    title.innerText = "Unknown Location";
    desc.innerHTML = "No information recorded for: " + locationName;
    panel.classList.remove('hidden');
    return;
  }

  title.innerText = locationName;

  // Handle both flat strings and structured objects
  const description = typeof entry === 'string' ? entry : entry.description;
  let html = `<p>${description}</p>`;

  // If there are sub-locations, render them as clickable buttons
  if (entry.subLocations && entry.subLocations.length > 0) {
    html += `<hr style="border-color: #561c1c; margin: 12px 0;">`;
    html += `<p style="color: #a1a1aa; font-size: 0.85rem; margin-bottom: 8px;">LOCATIONS WITHIN</p>`;
    entry.subLocations.forEach(sub => {
      html += `<button 
        type="button"
        onclick="showInfo('${sub.replace(/'/g, "\\'")}')" 
        style="display:block; width:100%; text-align:left; margin-bottom:6px; padding:8px 10px;
               background:#1a1a1c; border:1px solid #561c1c; border-radius:4px;
               color:#f87171; cursor:pointer; font-family:Georgia,serif; font-size:0.9rem;">
        📍 ${sub}
      </button>`;
    });
  }

  // Back button if this is a sub-location
  const parentEntry = Object.entries(locationInfo).find(([key, val]) =>
    typeof val === 'object' && val.subLocations && val.subLocations.includes(locationName)
  );
  if (parentEntry) {
    html += `<hr style="border-color: #561c1c; margin: 12px 0;">`;
    html += `<button 
      type="button"
      onclick="showInfo('${parentEntry[0]}')"
      style="display:block; width:100%; text-align:left; padding:8px 10px;
             background:#1a1a1c; border:1px solid #2e2e33; border-radius:4px;
             color:#a1a1aa; cursor:pointer; font-family:Georgia,serif; font-size:0.85rem;">
      ← Back to ${parentEntry[0]}
    </button>`;
  }

  desc.innerHTML = html;
  panel.classList.remove('hidden');
}

</script>

<div id="info-panel" class="hidden">
  <h2 id="location-name">Select a location</h2>
  <p id="location-desc"></p>
  <button type="button" onclick="document.getElementById('info-panel').classList.add('hidden')">✕ Close</button>
